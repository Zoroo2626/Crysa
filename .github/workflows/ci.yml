name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -q --tb=short

  lint:
    name: Import check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Verify all modules import cleanly
        run: |
          python -c "
          import sys
          mods = [
            'crysa',
            'crysa.engine.constants',
            'crysa.engine.findings',
            'crysa.engine.parser',
            'crysa.engine.context',
            'crysa.engine.reviewer',
            'crysa.utils.config',
            'crysa.utils.logger',
            'crysa.utils.git',
            'crysa.watcher',
            'crysa.mcp_server',
            'crysa.cli',
          ]
          failed = []
          for m in mods:
              try:
                  __import__(m)
                  print(f'  OK  {m}')
              except Exception as e:
                  print(f'  FAIL {m}: {e}')
                  failed.append(m)
          if failed:
              sys.exit(1)
          "
